<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커스텀 2048</title>
  <style>
    :root{
      --bg:#faf8ef;
      --board:#bbada0;
      --cell:#cdc1b4;
      --text:#776e65;
      --light:#f9f6f2;
      --btn:#8f7a66;
      --panel:#ffffff;
      --shadow:0 8px 20px rgba(0,0,0,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:linear-gradient(180deg,#fffdf7 0%, #f6f1e7 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .app{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: minmax(320px, 520px) minmax(280px, 380px);
      gap:24px;
      align-items:start;
    }
    .card{
      background:var(--panel);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px;
    }
    .title-row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    h1{
      margin:0;
      font-size:42px;
      line-height:1;
      letter-spacing:-1px;
    }
    .subtitle{
      margin:6px 0 0;
      opacity:.85;
      font-size:14px;
    }
    .scores{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .score-box{
      background:#eee4da;
      color:#fff;
      border-radius:12px;
      min-width:90px;
      padding:10px 14px;
      text-align:center;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.05);
    }
    .score-box .label{
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.9;
    }
    .score-box .value{
      font-size:26px;
      font-weight:700;
      margin-top:2px;
    }
    .controls{
      display:flex;
      gap:10px;
      margin:14px 0 14px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      background:var(--btn);
      color:white;
      padding:11px 16px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      transition:.15s transform ease, .15s opacity ease;
    }
    button:hover{opacity:.92}
    button:active{transform:translateY(1px)}
    .board-wrap{
      position:relative;
      width:100%;
      aspect-ratio:1/1;
      background:var(--board);
      border-radius:20px;
      padding:12px;
      user-select:none;
      touch-action:none;
      overflow:hidden;
    }
    .grid{
      position:absolute;
      inset:12px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      grid-template-rows:repeat(4,1fr);
      gap:12px;
    }
    .cell{
      background:var(--cell);
      border-radius:14px;
    }
    .tile-layer{
      position:absolute;
      inset:12px;
      pointer-events:none;
    }
    .tile{
      position:absolute;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      transition:left .12s ease, top .12s ease, transform .12s ease;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }
    .tile.pop{
      animation:pop .18s ease;
    }
    @keyframes pop{
      0%{transform:scale(.7)}
      100%{transform:scale(1)}
    }
    .tile .fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px;
      text-align:center;
      word-break:keep-all;
      line-height:1.1;
    }
    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .overlay{
      position:absolute;
      inset:0;
      background:rgba(238,228,218,.78);
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
      z-index:10;
    }
    .overlay.show{display:flex}
    .overlay-box{
      background:rgba(255,255,255,.95);
      border-radius:20px;
      padding:24px;
      max-width:90%;
      box-shadow:var(--shadow);
    }
    .overlay-box h2{
      margin:0 0 8px;
      font-size:34px;
    }
    .overlay-box p{
      margin:0 0 16px;
      font-size:17px;
      line-height:1.5;
    }
    .side h2{
      margin:0 0 10px;
      font-size:22px;
    }
    .side p, .side li{
      line-height:1.6;
      font-size:15px;
    }
    code, pre{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    pre{
      background:#f7f5ef;
      padding:14px;
      border-radius:14px;
      overflow:auto;
      font-size:13px;
      white-space:pre-wrap;
    }
    .hint{
      background:#f7f3ea;
      border-radius:14px;
      padding:12px 14px;
      margin-top:12px;
      font-size:14px;
    }
    .milestone-log{
      background:#faf7f2;
      border-radius:14px;
      padding:12px 14px;
      min-height:56px;
      font-size:14px;
    }
    @media (max-width: 860px){
      .app{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="title-row">
        <div>
          <h1>커스텀 2048</h1>
          <p class="subtitle">이미지/문구를 원하는 대로 바꿀 수 있는 HTML 버전</p>
        </div>
        <div class="scores">
          <div class="score-box">
            <div class="label">Score</div>
            <div class="value" id="score">0</div>
          </div>
          <div class="score-box">
            <div class="label">Best</div>
            <div class="value" id="best">0</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="restartBtn">새 게임</button>
              </div>

      <div class="board-wrap" id="boardWrap" aria-label="2048 게임판">
        <div class="grid" id="grid"></div>
        <div class="tile-layer" id="tileLayer"></div>

        <div class="overlay" id="messageOverlay">
          <div class="overlay-box">
            <h2 id="overlayTitle">축하합니다!</h2>
            <p id="overlayText">원하는 숫자에 도달했습니다.</p>
            <button id="closeOverlayBtn">계속하기</button>
          </div>
        </div>

        <div class="overlay" id="gameOverOverlay">
          <div class="overlay-box">
            <h2>게임 오버</h2>
            <p>더 이상 이동할 수 없습니다.</p>
            <button id="retryBtn">다시 시작</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="card side">
      <h2>진행 상태</h2>
      <div class="milestone-log" id="milestoneLog">아직 출력된 메시지가 없습니다.</div>
      <div class="hint">
        <strong>조작:</strong> 방향키 / WASD / 모바일 스와이프
      </div>
    </aside>
  </div>

AA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAA4IOAAAAAwHOugY6H6rNOwAAAABJRU5ErkJggg==" },

        32:   { type: "text",  value: "⭐" },

        128:  { type: "text",  value: "💎" },
        256:  { type: "text",  value: "👑" },

      milestones: {
        128: "우와! 128 달성!",
        512: "대단해! 512 달성!",
        1024: "정말 잘하고 있어!",
        2048: "축하합니다! 목표 숫자에 도달했어요!"
      }

    // -------------------------
    // 게임 로직
    // -------------------------
    const gridEl = document.getElementById("grid");
    const tileLayerEl = document.getElementById("tileLayer");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const messageOverlay = document.getElementById("messageOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const closeOverlayBtn = document.getElementById("closeOverlayBtn");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const retryBtn = document.getElementById("retryBtn");
    const restartBtn = document.getElementById("restartBtn");
    const boardWrap = document.getElementById("boardWrap");
    const milestoneLog = document.getElementById("milestoneLog");

    const size = CONFIG.boardSize;
    const gap = 12;
    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem("custom2048-best") || 0);
    let shownMilestones = new Set(JSON.parse(localStorage.getItem("custom2048-milestones") || "[]"));
    let isGameOver = false;
    let touchStartX = 0;
    let touchStartY = 0;

    bestEl.textContent = best;

    function initGridBg() {
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      gridEl.style.gridTemplateRows = `repeat(${size}, 1fr)`;
      for (let i = 0; i < size * size; i++) {
        const c = document.createElement("div");
        c.className = "cell";
        gridEl.appendChild(c);
      }
    }

    function emptyBoard() {
      return Array.from({ length: size }, () => Array(size).fill(0));
    }

    function restartGame() {
      board = emptyBoard();
      score = 0;
      isGameOver = false;
      scoreEl.textContent = "0";
      gameOverOverlay.classList.remove("show");
      messageOverlay.classList.remove("show");
      addRandomTile();
      addRandomTile();
      render();
    }

    function getEmptyCells() {
      const cells = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c] === 0) cells.push({ r, c });
        }
      }
      return cells;
    }

    function addRandomTile() {
      const empties = getEmptyCells();
      if (!empties.length) return;
      const { r, c } = empties[Math.floor(Math.random() * empties.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function cloneBoard(b) {
      return b.map(row => [...row]);
    }

    function arraysEqual(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function slideAndMergeRowLeft(row) {
      const filtered = row.filter(v => v !== 0);
      const merged = [];
      let gained = 0;
      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] === filtered[i + 1]) {
          const nv = filtered[i] * 2;
          merged.push(nv);
          gained += nv;
          i++;
        } else {
          merged.push(filtered[i]);
        }
      }
      while (merged.length < size) merged.push(0);
      return { row: merged, gained };
    }

    function reverseRows(b) {
      return b.map(row => [...row].reverse());
    }

    function transpose(b) {
      return b[0].map((_, c) => b.map(row => row[c]));
    }

    function moveLeft() {
      const old = cloneBoard(board);
      let gainedTotal = 0;
      board = board.map(row => {
        const { row: nr, gained } = slideAndMergeRowLeft(row);
        gainedTotal += gained;
        return nr;
      });
      return finalizeMove(old, gainedTotal);
    }

    function moveRight() {
      const old = cloneBoard(board);
      let gainedTotal = 0;
      board = reverseRows(board).map(row => {
        const { row: nr, gained } = slideAndMergeRowLeft(row);
        gainedTotal += gained;
        return nr;
      });
      board = reverseRows(board);
      return finalizeMove(old, gainedTotal);
    }

    function moveUp() {
      const old = cloneBoard(board);
      let gainedTotal = 0;
      board = transpose(board);
      board = board.map(row => {
        const { row: nr, gained } = slideAndMergeRowLeft(row);
        gainedTotal += gained;
        return nr;
      });
      board = transpose(board);
      return finalizeMove(old, gainedTotal);
    }

    function moveDown() {
      const old = cloneBoard(board);
      let gainedTotal = 0;
      board = transpose(board);
      board = reverseRows(board);
      board = board.map(row => {
        const { row: nr, gained } = slideAndMergeRowLeft(row);
        gainedTotal += gained;
        return nr;
      });
      board = reverseRows(board);
      board = transpose(board);
      return finalizeMove(old, gainedTotal);
    }

    function finalizeMove(oldBoard, gained) {
      const changed = !arraysEqual(oldBoard, board);
      if (changed) {
        score += gained;
        if (score > best) {
          best = score;
          localStorage.setItem("custom2048-best", String(best));
          bestEl.textContent = best;
        }
        scoreEl.textContent = score;
        addRandomTile();
        checkMilestones();
        render();
        checkGameOver();
      }
      return changed;
    }

    function canMove() {
      if (getEmptyCells().length) return true;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const v = board[r][c];
          if (r + 1 < size && board[r + 1][c] === v) return true;
          if (c + 1 < size && board[r][c + 1] === v) return true;
        }
      }
      return false;
    }

    function checkGameOver() {
      if (!canMove()) {
        isGameOver = true;
        gameOverOverlay.classList.add("show");
      }
    }

    function checkMilestones() {
      const flat = board.flat();
      const values = Object.keys(CONFIG.milestones)
        .map(Number)
        .sort((a, b) => a - b);

      for (const value of values) {
        if (flat.some(v => v >= value) && !shownMilestones.has(value)) {
          shownMilestones.add(value);
          localStorage.setItem("custom2048-milestones", JSON.stringify([...shownMilestones]));
          overlayTitle.textContent = value >= CONFIG.winValue ? "축하합니다!" : "메시지";
          overlayText.textContent = CONFIG.milestones[value];
          milestoneLog.textContent = `[${value}] ${CONFIG.milestones[value]}`;
          messageOverlay.classList.add("show");
          break;
        }
      }
    }

    function getTileStyle(value) {
      const map = {
        2:"#eee4da",4:"#ede0c8",8:"#f2b179",16:"#f59563",32:"#f67c5f",64:"#f65e3b",
        128:"#edcf72",256:"#edcc61",512:"#edc850",1024:"#edc53f",2048:"#edc22e"
      };
      return {
        bg: map[value] || "#3c3a32",
        color: value <= 4 ? "#776e65" : "#f9f6f2"
      };
    }

    function render() {
      tileLayerEl.innerHTML = "";

      const wrapRect = boardWrap.getBoundingClientRect();
      const innerSize = wrapRect.width - 24;
      const tileSize = (innerSize - gap * (size - 1)) / size;

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const value = board[r][c];
          if (!value) continue;

          const tile = document.createElement("div");
          tile.className = "tile pop";
          tile.style.width = `${tileSize}px`;
          tile.style.height = `${tileSize}px`;
          tile.style.left = `${c * (tileSize + gap)}px`;
          tile.style.top = `${r * (tileSize + gap)}px`;

          const style = getTileStyle(value);
          tile.style.background = style.bg;
          tile.style.color = style.color;

          const custom = CONFIG.tileContent[value];

          if (custom?.type === "image") {
            const img = document.createElement("img");
            img.src = custom.value;
            img.alt = String(value);
            img.onerror = () => {
              tile.innerHTML = "";
              const fallback = document.createElement("div");
              fallback.className = "fallback";
              fallback.style.fontSize = `${Math.max(18, tileSize * 0.24)}px`;
              fallback.textContent = CONFIG.showNumberWhenImageExists ? String(value) : "이미지";
              tile.appendChild(fallback);
            };
            tile.appendChild(img);

          } else {
            const fallback = document.createElement("div");
            fallback.className = "fallback";
            const customText = custom?.type === "text" ? custom.value : String(value);
            fallback.textContent = customText;
            fallback.style.fontSize =
              String(customText).length >= 4
                ? `${Math.max(14, tileSize * 0.18)}px`
                : `${Math.max(22, tileSize * 0.34)}px`;
            tile.appendChild(fallback);

            if (custom?.type === "text" && custom.value !== String(value)) {
              tile.title = `값: ${value}`;
            }
          }

          if (custom && CONFIG.showNumberWhenImageExists) {
            const overlay = document.createElement("div");
            overlay.style.position = "absolute";
            overlay.style.right = "6px";
            overlay.style.bottom = "4px";
            overlay.style.background = "rgba(0,0,0,.48)";
            overlay.style.color = "white";
            overlay.style.padding = "2px 6px";
            overlay.style.borderRadius = "999px";
            overlay.style.fontSize = `${Math.max(10, tileSize * 0.10)}px`;
            overlay.textContent = value;
            tile.appendChild(overlay);
          }

          tileLayerEl.appendChild(tile);
        }
      }
    }

    function handleMove(dir) {
      if (isGameOver) return;
      switch (dir) {
        case "left": return moveLeft();
        case "right": return moveRight();
        case "up": return moveUp();
        case "down": return moveDown();
      }
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowleft","a"].includes(key)) { e.preventDefault(); handleMove("left"); }
      if (["arrowright","d"].includes(key)) { e.preventDefault(); handleMove("right"); }
      if (["arrowup","w"].includes(key)) { e.preventDefault(); handleMove("up"); }
      if (["arrowdown","s"].includes(key)) { e.preventDefault(); handleMove("down"); }
    });

    boardWrap.addEventListener("touchstart", (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    boardWrap.addEventListener("touchend", (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (Math.max(absX, absY) < 24) return;
      if (absX > absY) handleMove(dx > 0 ? "right" : "left");
      else handleMove(dy > 0 ? "down" : "up");
    }, { passive: true });

    restartBtn.addEventListener("click", restartGame);
    retryBtn.addEventListener("click", restartGame);
    closeOverlayBtn.addEventListener("click", () => messageOverlay.classList.remove("show"));

    window.addEventListener("resize", render);

    initGridBg();
    restartGame();
  </script>
</body>
</html>
